<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — David Bridwell Ph.D.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-wrap">

    <nav class="site-nav">
      <a href="index.html" class="site-logo">David Bridwell <span>Ph.D.</span></a>
      <div class="nav-links">
        <a href="portfolio.html" class="nav-link">Portfolio</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </div>
    </nav>

    <div class="contact-wrap">
      <div class="section-label" style="margin-bottom:2rem;">Contact</div>
      <div class="contact-intro">Available for content marketing and brand strategy engagements in healthtech, payer, and provider markets.</div>
      <form>
        <div class="contact-field">
          <label class="contact-label" for="name">Name</label>
          <input type="text" id="name" name="name" class="contact-input" placeholder="Your name">
        </div>
        <div class="contact-field">
          <label class="contact-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="contact-input" placeholder="your@email.com">
        </div>
        <div class="contact-field">
          <label class="contact-label" for="message">Message</label>
          <textarea id="message" name="message" class="contact-input contact-textarea" placeholder="What are you working on?"></textarea>
        </div>
        <button type="submit" class="contact-btn">Send Message</button>
      </form>
    </div>

    <footer class="footer">
      <div class="footer-name">David Bridwell Ph.D.</div>
      <div class="footer-copy">Healthtech Marketing</div>
    </footer>

  </div>
</body>
</html>
