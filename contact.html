<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — David Bridwell Ph.D.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-wrap">

    <nav class="site-nav">
      <a href="index.html" class="site-logo">David Bridwell <span>Ph.D.</span></a>
      <div class="nav-links">
        <a href="portfolio.html" class="nav-link">Portfolio</a>
        <a href="contact.html" class="nav-link active">Contact</a>
      </div>
    </nav>

    <div class="contact-wrap">
      <div class="section-label" style="margin-bottom:2rem;">Contact</div>
      <div class="contact-intro">Available for content marketing and brand strategy engagements in healthtech, payer, and provider markets.</div>
      <form id="contact-form" action="https://formspree.io/f/xaqlrnoj" method="POST">
        <input type="hidden" name="_replyto" id="_replyto">
        <div class="contact-field">
          <label class="contact-label" for="name">Name</label>
          <input type="text" id="name" name="name" class="contact-input" placeholder="Your name" required>
        </div>
        <div class="contact-field">
          <label class="contact-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="contact-input" placeholder="your@email.com" required oninput="document.getElementById('_replyto').value=this.value">
        </div>
        <div class="contact-field">
          <label class="contact-label" for="message">Message</label>
          <textarea id="message" name="message" class="contact-input contact-textarea" placeholder="What are you working on?" required></textarea>
        </div>
        <button type="submit" class="contact-btn">Send Message</button>
      </form>
      <div id="thank-you" style="display:none; margin-top:2rem;">
        <p style="font-size:15px; line-height:1.85; color:var(--text);">Thank you for reaching out. I'll be in touch soon.</p>
      </div>
      <script>
        document.getElementById('contact-form').addEventListener('submit', function(e) {
          e.preventDefault();
          var form = this;
          fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          }).then(function(response) {
            if (response.ok) {
              form.style.display = 'none';
              document.getElementById('thank-you').style.display = 'block';
            }
          });
        });
      </script>
    </div>

    <footer class="footer">
      <div class="footer-name">David Bridwell Ph.D.</div>
      <div class="footer-copy">Healthtech Marketing</div>
    </footer>

  </div>
</body>
</html>
